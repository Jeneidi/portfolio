<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0EEE6"/>
      <stop offset="100%" stop-color="#EEECE2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" fill="url(#bg)"/>

  <!-- Claude lockup: coral starburst + "Claude", visually centered on x=600, vcenter y=240 -->
  <g transform="translate(480.5,240)">
    <!-- official Claude logomark (simple-icons), ~120px footprint centered on local origin -->
    <g transform="translate(-60,-60) scale(5)"><path fill="#D97757" d="m4.7144 15.9555 4.7174-2.6471.079-.2307-.079-.1275h-.2307l-.7893-.0486-2.6956-.0729-2.3375-.0971-2.2646-.1214-.5707-.1215-.5343-.7042.0546-.3522.4797-.3218.686.0608 1.5179.1032 2.2767.1578 1.6514.0972 2.4468.255h.3886l.0546-.1579-.1336-.0971-.1032-.0972L6.973 9.8356l-2.55-1.6879-1.3356-.9714-.7225-.4918-.3643-.4614-.1578-1.0078.6557-.7225.8803.0607.2246.0607.8925.686 1.9064 1.4754 2.4893 1.8336.3643.3035.1457-.1032.0182-.0728-.164-.2733-1.3539-2.4467-1.445-2.4893-.6435-1.032-.17-.6194c-.0607-.255-.1032-.4674-.1032-.7285L6.287.1335 6.6997 0l.9957.1336.419.3642.6192 1.4147 1.0018 2.2282 1.5543 3.0296.4553.8985.2429.8318.091.255h.1579v-.1457l.1275-1.706.2368-2.0947.2307-2.6957.0789-.7589.3764-.9107.7468-.4918.5828.2793.4797.686-.0668.4433-.2853 1.8517-.5586 2.9021-.3643 1.9429h.2125l.2429-.2429.9835-1.3053 1.6514-2.0643.7286-.8196.85-.9046.5464-.4311h1.0321l.759 1.1293-.34 1.1657-1.0625 1.3478-.8804 1.1414-1.2628 1.7-.7893 1.36.0729.1093.1882-.0183 2.8535-.607 1.5421-.2794 1.8396-.3157.8318.3886.091.3946-.3278.8075-1.967.4857-2.3072.4614-3.4364.8136-.0425.0304.0486.0607 1.5482.1457.6618.0364h1.621l3.0175.2247.7892.522.4736.6376-.079.4857-1.2142.6193-1.6393-.3886-3.825-.9107-1.3113-.3279h-.1822v.1093l1.0929 1.0686 2.0035 1.8092 2.5075 2.3314.1275.5768-.3218.4554-.34-.0486-2.2039-1.6575-.85-.7468-1.9246-1.621h-.1275v.17l.4432.6496 2.3436 3.5214.1214 1.0807-.17.3521-.6071.2125-.6679-.1214-1.3721-1.9246L14.38 17.959l-1.1414-1.9428-.1397.079-.674 7.2552-.3156.3703-.7286.2793-.6071-.4614-.3218-.7468.3218-1.4753.3886-1.9246.3157-1.53.2853-1.9004.17-.6314-.0121-.0425-.1397.0182-1.4328 1.9672-2.1796 2.9446-1.7243 1.8456-.4128.164-.7164-.3704.0667-.6618.4008-.5889 2.386-3.0357 1.4389-1.882.929-1.0868-.0062-.1579h-.0546l-6.3385 4.1164-1.1293.1457-.4857-.4554.0608-.7467.2307-.2429 1.9064-1.3114Z"/></g>
    <text x="88" y="0" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="66" font-weight="600" fill="#1A1A18">Claude</text>
  </g>

  <!-- TrustGate product lockup, horizontally centered on x=600, vcenter y=455 -->
  <!-- gauge outer radius=90, inner radius=60, center at (48,90) in local space -->
  <!-- scale 1.95 same as SafeDeps, translate to center on (600,455) -->
  <!-- local width: gauge spans x=-42 to x=138 (180px) + text to ~x=280. total ~322px local -->
  <!-- at scale 1.95 that's ~628px. left edge: 600 - 628/2 = 286. translate x=286 -->
  <!-- but safedeps uses translate(311.4,357.5) so text starts ~311+100*1.95=506 -->
  <!-- let's match SafeDeps translate approach: gauge left edge ~x=18, text at x=100 -->
  <!-- gauge center x=48 (same as shield center), y anchor = 50 (midpoint of 14-86) -->
  <g transform="translate(311.4,357.5) scale(1.95)">
    <!-- speedometer gauge, center (48,50), outer r=40, inner r=26 -->
    <!-- arc from 180deg to 0deg (left to right, top half), split into 3 zones -->
    <!-- red zone: 180°→240° (left third), amber: 240°→300°, green: 300°→360°(=0°) -->
    <!-- using path arcs. Arc params: rx ry x-rot large-arc sweep dx dy -->
    <!-- center=(48,50), R=40, r=26 -->
    <!-- zone angles (measured from 3-o'clock, CCW positive in SVG coords = CW visual) -->
    <!-- SVG arcs: sweep=1 means clockwise -->
    <!-- We want a semicircle going left-to-right across the top -->
    <!-- start at (8,50) [leftmost], end at (88,50) [rightmost], bulge upward -->
    <!-- Split: left third ends at 240° from 3-o'clock = angle 60° above left = (-12, 50-34.6)=(36,15.4)... -->
    <!-- Simpler: define 4 points on outer arc and 4 on inner arc -->
    <!-- Angles from standard: 180°=left, 120°=upper-left, 60°=upper-right, 0°=right -->
    <!-- outer R=40 from center(48,50): -->
    <!--   180°: (48-40, 50) = (8, 50) -->
    <!--   120°: (48+40cos120, 50+40sin120) = (48-20, 50-34.64) = (28, 15.36) -->
    <!--    60°: (48+40cos60,  50+40sin60)  = (48+20, 50-34.64) = (68, 15.36) -->
    <!--     0°: (48+40, 50) = (88, 50) -->
    <!-- inner r=26: -->
    <!--   180°: (48-26, 50) = (22, 50) -->
    <!--   120°: (48+26cos120, 50+26sin120) = (48-13, 50-22.52) = (35, 27.48) -->
    <!--    60°: (48+26cos60,  50+26sin60)  = (48+13, 50-22.52) = (61, 27.48) -->
    <!--     0°: (48+26, 50) = (74, 50) -->

    <!-- red zone: 180° to 120° -->
    <path d="M8,50 A40,40 0 0,1 28,15.36 L35,27.48 A26,26 0 0,0 22,50 Z" fill="#dc2626"/>
    <!-- amber zone: 120° to 60° -->
    <path d="M28,15.36 A40,40 0 0,1 68,15.36 L61,27.48 A26,26 0 0,0 35,27.48 Z" fill="#d97706"/>
    <!-- green zone: 60° to 0° -->
    <path d="M68,15.36 A40,40 0 0,1 88,50 L74,50 A26,26 0 0,0 61,27.48 Z" fill="#16a34a"/>

    <!-- gauge base cap (flat bottom) -->
    <rect x="8" y="50" width="80" height="3" rx="1.5" fill="#cbd5e1"/>

    <!-- needle pointing to ~340° (deep green zone) -->
    <!-- needle tip on outer arc at 340°: (48+40cos340, 50+40sin340) = (48+37.6, 50-13.7) = (85.6,36.3) -->
    <!-- needle base at center (48,50), width 3 -->
    <line x1="48" y1="50" x2="83" y2="37.5" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
    <!-- center hub -->
    <circle cx="48" cy="50" r="5" fill="#0f172a"/>
    <circle cx="48" cy="50" r="2.5" fill="#f8fafc"/>

    <!-- wordmark -->
    <text x="100" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="700" letter-spacing="-1.5" fill="#0f172a">trustgate</text>
    <!-- tagline -->
    <text x="102" y="67" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" letter-spacing="0.2" fill="#64748b">scores every AI change</text>
    <text x="102" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" letter-spacing="0.2" fill="#64748b">before you accept it</text>
  </g>
</svg>
