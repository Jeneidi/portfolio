<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0EEE6"/>
      <stop offset="100%" stop-color="#EEECE2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" fill="url(#bg)"/>

  <!-- starburst mark -->
  <g transform="translate(600,260)" stroke="#D97757" stroke-linecap="round">
    <g stroke-width="10">
      <line x1="0" y1="-92" x2="0" y2="-46"/>
      <line x1="0" y1="46" x2="0" y2="92"/>
      <line x1="-92" y1="0" x2="-46" y2="0"/>
      <line x1="46" y1="0" x2="92" y2="0"/>
    </g>
    <g stroke-width="8" transform="rotate(45)">
      <line x1="0" y1="-92" x2="0" y2="-46"/>
      <line x1="0" y1="46" x2="0" y2="92"/>
      <line x1="-92" y1="0" x2="-46" y2="0"/>
      <line x1="46" y1="0" x2="92" y2="0"/>
    </g>
    <g stroke-width="6" transform="rotate(22.5)">
      <line x1="0" y1="-92" x2="0" y2="50"/>
      <line x1="0" y1="46" x2="0" y2="92"/>
      <line x1="-92" y1="0" x2="-46" y2="0"/>
      <line x1="46" y1="0" x2="92" y2="0"/>
    </g>
    <g stroke-width="6" transform="rotate(67.5)">
      <line x1="0" y1="-92" x2="0" y2="-46"/>
      <line x1="0" y1="46" x2="0" y2="92"/>
      <line x1="-92" y1="0" x2="-46" y2="0"/>
      <line x1="46" y1="0" x2="92" y2="0"/>
    </g>
    <circle r="14" fill="#D97757"/>
  </g>

  <!-- eyebrow label -->
  <text x="600" y="400" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="4" fill="#8b5cf6">CLAUDE CODE · PLUGIN</text>

  <!-- wordmark -->
  <text x="600" y="490" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="104" font-weight="800" fill="#1A1A18">SafeDeps</text>

  <!-- security/dependency chip -->
  <g transform="translate(600,575)">
    <rect x="-180" y="-32" width="360" height="64" rx="32" fill="#1A1A18"/>
    <text x="-10" y="10" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#F0EEE6">lodash@4.17.21</text>
    <circle cx="138" cy="0" r="20" fill="#3ddc84"/>
    <path d="M 129 0 L 136 7 L 149 -8" stroke="#1A1A18" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
